name: Build & Deploy

on:
  push:
    branches:
      - main
      - staging

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
          else
            echo "tag=staging" >> $GITHUB_OUTPUT
          fi

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/ourkinfamily/app:${{ steps.tag.outputs.tag }}

  deploy:
    needs: build
    runs-on: self-hosted

    steps:
      - name: Deploy
        env:
          ENV: ${{ github.ref_name == 'main' && 'prod' || 'staging' }}
        run: |
          cd /home/stephen/Documents/ourkin/deploy
          docker compose -f docker-compose.yml -f docker-compose.${ENV}.yml pull app
          docker compose -f docker-compose.yml -f docker-compose.${ENV}.yml up -d app
