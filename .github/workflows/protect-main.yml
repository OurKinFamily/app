name: Protect main

on:
  pull_request:
    branches:
      - main

jobs:
  check-source:
    runs-on: ubuntu-latest
    steps:
      - name: Require staging as source
        if: github.head_ref != 'staging'
        run: |
          echo "PRs to main must come from the staging branch (got: ${{ github.head_ref }})"
          exit 1
